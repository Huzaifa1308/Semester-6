<!DOCTYPE html>
<html>

<head>
    <title>Random password generator</title>

    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: white;
            text-align: center;
        }

        .main {
            width: 350px;
            margin: 100px auto;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 10px;
        }

        #password {
            width: 90%;
            padding: 10px;
            margin-top: 15px;
        }

        button {
            padding: 10px 20px;
            background: #4CAF50;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .toadd {
            text-align: left;
            margin-left: 25px;
        }
    </style>
</head>
<body>
    <div class="main">
        <h2>Password Generator</h2>
        <div class="toadd">
            <label><input type="checkbox" id="uppercase"> Uppercase</label><br>
            <label><input type="checkbox" id="lowercase"> Lowercase</label><br>
            <label><input type="checkbox" id="numbers"> Numbers</label><br>
            <label><input type="checkbox" id="symbols"> Special Characters</label>
        </div>
        <br>
        <label>Password Length (8–20):</label><br>
        <input type="number" id="length" min="8" max="20" value="12">
        <br><br>
        <button onclick="generatePassword()">Generate</button>
        <input type="text" id="password" placeholder="Generated Password" readonly>
    </div>
    <script>
        function generatePassword() {
            let uppercase = document.getElementById("uppercase").checked;
            let lowercase = document.getElementById("lowercase").checked;
            let numbers = document.getElementById("numbers").checked;
            let symbols = document.getElementById("symbols").checked;
            let length = document.getElementById("length").value;
            let upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let lowerChars = "abcdefghijklmnopqrstuvwxyz";
            let numberChars = "0123456789";
            let symbolChars = "!@#$%^&*()_+";
            let allChars = "";
            if (uppercase) allChars += upperChars;
            if (lowercase) allChars += lowerChars;
            if (numbers) allChars += numberChars;
            if (symbols) allChars += symbolChars;
            if (allChars === "") {
                alert("Please select at least one character type to add");
                return;
            }
            let password = "";
            for (let i = 0; i < length; i++) {
                let randomIndex = Math.floor(Math.random() * allChars.length);
                password += allChars[randomIndex];
            }
            document.getElementById("password").value = password;
        }
    </script>
</body>
</html>
